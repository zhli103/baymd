name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx2g -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn'

jobs:
  unit-test:
    name: Unit Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: baymd
          POSTGRES_PASSWORD: baymd_test
          POSTGRES_DB: baymd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U baymd -d baymd_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Install dependencies (skip tests)
        run: ./mvnw install -DskipTests -q

      - name: Run all unit tests (exclude integration)
        run: |
          ./mvnw test \
            -Dtest='!com.zhli.baymd.rag.StreamChatPipelineIntegrationTest' \
            -Dsurefire.failIfNoSpecifiedTests=false
        timeout-minutes: 15

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-${{ matrix.java }}
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*.txt
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: unit-test
    # 集成测试需要真实 LLM API key，仅在手动触发或 PR 到 main 时运行
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: baymd
          POSTGRES_PASSWORD: baymd_test
          POSTGRES_DB: baymd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U baymd -d baymd_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Install dependencies (skip tests)
        run: ./mvnw install -DskipTests -q

      - name: Run integration tests
        run: |
          ./mvnw test -pl bootstrap \
            -Dtest='com.zhli.baymd.rag.StreamChatPipelineIntegrationTest' \
            -Dsurefire.failIfNoSpecifiedFiles=false \
            -DBAILIAN_API_KEY=${{ secrets.BAILIAN_API_KEY }}
        timeout-minutes: 30
        continue-on-error: true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*.txt
          retention-days: 7

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-24.04
    needs: [unit-test]
    if: always()
    steps:
      - name: Check unit test status
        run: |
          if [ "${{ needs.unit-test.result }}" = "failure" ]; then
            echo "❌ Unit tests failed — block merge"
            exit 1
          fi
          echo "✅ Unit tests passed"
