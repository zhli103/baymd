server:
  port: 9090
  address: 0.0.0.0
  servlet:
    context-path: /api/baymd

spring:
  application:
    name: baymd${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/baymd?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: BayMDHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: baymd-producer${unique-name:}_pg
    send-message-timeout: 2000

milvus:
  uri: http://localhost:19530

rag:
  react:
    enabled: true       # Agent 模式开关
    max-iterations: 5   # ReAct 最大迭代次数

  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true

  rate-limit:
    global:
      enabled: false
      max-concurrent: 1
      max-wait-seconds: 15
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    strategy: sliding_window
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    summary-max-chars: 200
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
#    ollama:
#      url: http://localhost:11434
#      endpoints:
#        chat: /v1/chat/completions
#        embedding: /v1/embeddings
    bailian:
      url: https://dashscope-intl.aliyuncs.com/
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        embedding: /compatible-mode/v1/embeddings
        rerank: /compatible-api/v1/reranks
#    aihubmix:
#      url: https://aihubmix.com
#      api-key: ${AIHUBMIX_API_KEY:}
#      endpoints:
#        chat: /v1/chat/completions
#        embedding: /v1/embeddings
#    siliconflow:
#      url: https://api.siliconflow.cn
#      api-key: ${SILICONFLOW_API_KEY:}
#      endpoints:
#        chat: /v1/chat/completions
#        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: qwen3.6-plus
    deep-thinking-model: qwen3.6-plus
    candidates:
      - id: qwen3.6-plus
        provider: bailian
        model: qwen3.6-plus
        priority: 1
        supports-thinking: true

  embedding:
    default-model: text-embedding-v4
    candidates:
      - id: text-embedding-v4
        provider: bailian
        model: text-embedding-v4
        priority: 1
#      - id: qwen-emb-local
#        provider: ollama
#        model: qwen3-embedding:8b-fp16
#        dimension: ${rag.default.dimension}
#        priority: 2
#      - id: text-embedding-3-large
#        provider: aihubmix
#        model: text-embedding-3-large
#        dimension: ${rag.default.dimension}
#        priority: 3

  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://localhost:9000
  access-key-id: admin
  secret-access-key: admin

storage:
  s3:
    endpoint: http://localhost:9000
    access-key-id: admin
    secret-access-key: admin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false
  eval:
    enabled: true
