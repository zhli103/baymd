<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医学问答助手 - 测试</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
.header { text-align: center; margin-bottom: 20px; }
.header h1 { color: #2c7a7b; font-size: 24px; }
.login-bar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
.login-bar input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.login-bar button { padding: 8px 20px; background: #2c7a7b; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
.quick-questions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
.quick-questions button { padding: 6px 14px; background: #e8f5f5; border: 1px solid #b2dfdb; border-radius: 16px; cursor: pointer; font-size: 13px; color: #00695c; white-space: nowrap; }
.quick-questions button:hover { background: #b2dfdb; }
.chat-box { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
.messages { height: 450px; overflow-y: auto; padding: 20px; }
.messages .msg { margin-bottom: 16px; line-height: 1.6; }
.messages .user { text-align: right; }
.messages .user span { background: #e3f2fd; padding: 8px 14px; border-radius: 12px; display: inline-block; max-width: 80%; text-align: left; }
.messages .assistant { color: #333; }
.messages .assistant .content { background: #fafafa; padding: 12px 16px; border-radius: 8px; display: inline-block; max-width: 90%; border-left: 3px solid #2c7a7b; }
.input-bar { display: flex; border-top: 1px solid #eee; padding: 12px; gap: 10px; }
.input-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
.input-bar input:focus { border-color: #2c7a7b; }
.input-bar button { padding: 10px 24px; background: #2c7a7b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
.input-bar button:disabled { background: #ccc; cursor: not-allowed; }
.status { font-size: 12px; color: #999; padding: 4px 12px; }
.loading::after { content: '▋'; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="header"><h1>医学问答助手测试</h1></div>

<div class="login-bar">
  <input id="apiBase" value="http://localhost:9090/api/baymd" placeholder="API地址" style="flex:2">
  <input id="username" value="test" placeholder="用户名">
  <input id="password" value="123456" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
  <span id="loginStatus" style="font-size:12px;color:#999"></span>
</div>

<div class="quick-questions">
  <button onclick="ask('头疼应该挂什么科')">头疼</button>
  <button onclick="ask('胃不舒服看哪个科室')">胃不舒服</button>
  <button onclick="ask('皮肤起红疹去哪个科')">皮肤红疹</button>
  <button onclick="ask('腰疼腿麻挂什么科')">腰疼腿麻</button>
  <button onclick="ask('小孩发烧去哪个科')">小孩发烧</button>
  <button onclick="ask('月经不调挂什么科')">月经不调</button>
  <button onclick="ask('心慌心悸去哪个科')">心慌心悸</button>
</div>

<div class="chat-box">
  <div class="messages" id="messages">
    <div class="msg assistant"><div class="content">你好！我是医学健康助手。点击上方快捷问题或输入症状开始测试。</div></div>
  </div>
  <div class="input-bar">
    <input id="question" placeholder="输入症状..." onkeydown="if(event.key==='Enter')ask()">
    <button id="sendBtn" onclick="ask()">发送</button>
  </div>
  <div class="status" id="status">就绪</div>
</div>

<script>
let token = '';

async function login() {
  const base = document.getElementById('apiBase').value;
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const res = await fetch(`${base}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      token = data.data.token;
      document.getElementById('loginStatus').textContent = '已登录';
      document.getElementById('loginStatus').style.color = 'green';
    } else {
      alert('登录失败: ' + data.message);
    }
  } catch(e) {
    alert('连接失败，确认服务已启动: ' + e.message);
  }
}

function ask(questionText) {
  const q = questionText || document.getElementById('question').value.trim();
  if (!q) return;
  if (!token) { alert('请先登录'); return; }

  const msgs = document.getElementById('messages');
  const base = document.getElementById('apiBase').value;

  // 用户消息
  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.innerHTML = `<span>${q}</span>`;
  msgs.appendChild(userDiv);
  document.getElementById('question').value = '';

  // AI 消息框
  const aiDiv = document.createElement('div');
  aiDiv.className = 'msg assistant';
  const contentDiv = document.createElement('div');
  contentDiv.className = 'content loading';
  contentDiv.id = 'stream-' + Date.now();
  aiDiv.appendChild(contentDiv);
  msgs.appendChild(aiDiv);
  msgs.scrollTop = msgs.scrollHeight;

  document.getElementById('sendBtn').disabled = true;
  document.getElementById('status').textContent = '请求中...';

  const url = `${base}/rag/v3/chat?question=${encodeURIComponent(q)}`;
  fetch(url, { headers: { 'Authorization': token } })
    .then(response => {
      if (!response.ok) throw new Error('HTTP ' + response.status);
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let started = false;

      function read() {
        reader.read().then(({ done, value }) => {
          if (done) {
            contentDiv.classList.remove('loading');
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('status').textContent = '完成';
            return;
          }
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('data:')) {
              const text = line.substring(5).trim();
              if (text === '[DONE]') continue;
              try {
                const json = JSON.parse(text);
                if (json.delta) {
                  contentDiv.textContent += json.delta;
                } else if (json.content) {
                  contentDiv.textContent += json.content;
                } else if (json.message) {
                  contentDiv.textContent = json.message;
                }
              } catch(e) {
                contentDiv.textContent += text;
              }
              if (!started) {
                contentDiv.classList.remove('loading');
                started = true;
              }
              msgs.scrollTop = msgs.scrollHeight;
            }
          }
          read();
        }).catch(err => {
          contentDiv.textContent = '读取错误: ' + err.message;
          document.getElementById('sendBtn').disabled = false;
        });
      }
      read();
    })
    .catch(err => {
      contentDiv.textContent = '请求失败: ' + err.message;
      contentDiv.classList.remove('loading');
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('status').textContent = '错误';
    });
}
</script>
</body>
</html>
